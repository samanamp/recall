# Auto-deploy for forks. Three ways it runs:
#   1. push to main        — your own commits, or a "Sync fork" that triggers CI
#   2. weekly schedule      — pulls upstream and redeploys, fully hands-off
#   3. "Run workflow" button (workflow_dispatch) — deploy on demand
#
# One-time fork setup:
#   • Actions tab → enable workflows (forks start with Actions disabled, and
#     that also gates the weekly schedule).
#   • Settings → Secrets and variables → Actions
#       Secrets:   CLOUDFLARE_API_TOKEN   (Workers Scripts:Edit + D1:Edit)
#                  CLOUDFLARE_ACCOUNT_ID
#       Variables: D1_DATABASE_ID         (from `npx wrangler d1 list`)
#                  CARDS_REPO             (e.g. yourname/recall-decks)
#                  CARDS_BRANCH           (optional, default main)
#                  D1_DATABASE_NAME       (optional, default recall)
#
# Run `node tools/setup.mjs` once locally first — it creates the D1 database and
# sets the APP_TOKEN / GITHUB_TOKEN worker secrets (those persist across deploys,
# so they're never needed here). The job skips on upstream and on any fork that
# hasn't set D1_DATABASE_ID, so enabling Actions before configuring is harmless.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC — adjust to taste

permissions:
  contents: write # the scheduled run fast-forwards your fork from upstream

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ vars.D1_DATABASE_ID != '' }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full history to fast-forward from upstream

      # Scheduled / manual runs pull the latest upstream first, then deploy it.
      # Push runs skip this (the new code is already what triggered them).
      # --ff-only keeps it safe: if your fork has diverged (local commits on
      # main), it deploys your current code untouched instead of force-merging.
      - name: Sync from upstream
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/samanamp/recall.git
          git fetch upstream
          if git merge --ff-only upstream/main; then
            git push origin HEAD:${GITHUB_REF_NAME} || true
          else
            echo "::warning::fork has diverged from upstream — deploying current code without syncing"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate wrangler.toml from example
        run: |
          sed -e "s|__DATABASE_ID__|${{ vars.D1_DATABASE_ID }}|" \
              -e "s|__CARDS_REPO__|${{ vars.CARDS_REPO }}|" \
              -e "s|__CARDS_BRANCH__|${{ vars.CARDS_BRANCH || 'main' }}|" \
              -e "s|database_name = \"recall\"|database_name = \"${{ vars.D1_DATABASE_NAME || 'recall' }}\"|" \
              worker/wrangler.example.toml > worker/wrangler.toml

      # npm install, not ci — see ci.yml for the lockfile-drift story.
      - name: Build app
        working-directory: app
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Apply D1 migrations
        working-directory: worker
        run: |
          npm install --no-audit --no-fund
          npx wrangler d1 migrations apply "${{ vars.D1_DATABASE_NAME || 'recall' }}" --remote

      - name: Deploy worker (app + API)
        working-directory: worker
        run: npx wrangler deploy
