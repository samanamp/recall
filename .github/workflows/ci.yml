name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json
      # npm install, not ci: macOS-generated lockfiles drift on wasm/platform
      # optional deps (npm/cli#4828) and strict ci rejects them on linux.
      - run: npm install --no-audit --no-fund
      - run: npm run build # tsc -b + vite build
      - run: npm test

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm install --no-audit --no-fund
      - run: npx tsc --noEmit
      - run: npm test
