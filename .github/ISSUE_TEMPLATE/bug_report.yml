name: Bug report
description: Something broke
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what happened instead?
    validations:
      required: true
  - type: input
    id: where
    attributes:
      label: Where?
      placeholder: e.g. iOS PWA, desktop Chrome, the worker, setup script
    validations:
      required: true
  - type: textarea
    id: sync
    attributes:
      label: Sync state (if sync-related)
      description: >
        What does Settings → Sync now report? Any errors in the browser
        console or `npx wrangler tail`? If a card looks wrong, what does its
        .md file in your cards repo say?
