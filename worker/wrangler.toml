name = "recall-api"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Create the database with:  npx wrangler d1 create mdanki
# then paste the database_id it prints below.
[[d1_databases]]
binding = "DB"
database_name = "mdanki"
database_id = "3ba0e8d7-6d36-4dfb-9014-798140066932"

[vars]
# The GitHub repo that holds your cards
GITHUB_REPO = "samanamp/recall-decks"
GITHUB_BRANCH = "main"

# Secrets (set with `npx wrangler secret put <NAME>`):
#   APP_TOKEN     - shared secret your devices use to talk to this worker
#   GITHUB_TOKEN  - fine-grained PAT, contents read/write on GITHUB_REPO only
