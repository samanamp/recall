<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Bright background so the icon reads on light AND dark context menus;
       a single bold glyph stays legible down to 16px (the menu size). -->
  <rect width="128" height="128" rx="30" fill="#0ea5e9"/>
  <rect x="14" y="14" width="100" height="100" rx="24" fill="#38bdf8"/>
  <text x="64" y="97" font-family="Helvetica, Arial, sans-serif" font-size="96" font-weight="bold" fill="#ffffff" text-anchor="middle">R</text>
</svg>
