<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- "Flip" — the two sides of a flashcard, folded open. Gradient + bright
       fold for a modern look; reads down to the 16px context-menu size. -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset=".5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="30" fill="#08080f"/>
  <path d="M64 22 L24 33 V95 L64 106 Z" fill="#cffafe"/>
  <path d="M64 22 L104 33 V95 L64 106 Z" fill="url(#g)"/>
  <line x1="64" y1="20" x2="64" y2="108" stroke="#f0fdff" stroke-width="4"/>
</svg>
