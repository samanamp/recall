<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>recall — settings</title>
    <style>
      :root { color-scheme: dark; }
      body {
        font: 14px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        color: #e4e4e7; background: #09090b; margin: 0; padding: 40px 20px;
      }
      .card { max-width: 440px; margin: 0 auto; }
      h1 { font-size: 20px; letter-spacing: -.02em; margin: 0 0 4px; }
      h1 b { color: #38bdf8; }
      p.sub { color: #a1a1aa; margin: 0 0 24px; }
      label { display: block; font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: #71717a; margin: 16px 0 6px; }
      input {
        width: 100%; box-sizing: border-box; padding: 10px 12px; color: #fafafa;
        background: #18181b; border: 1px solid #3f3f46; border-radius: 10px; font: inherit; outline: none;
      }
      input:focus { border-color: #38bdf8; }
      .row { display: flex; gap: 10px; align-items: center; margin-top: 22px; }
      button {
        padding: 9px 18px; border-radius: 10px; font: inherit; font-weight: 600; cursor: pointer; border: 1px solid transparent;
        background: #0284c7; color: #fff;
      }
      button:hover { background: #0369a1; }
      button.ghost { background: #18181b; color: #e4e4e7; border-color: #3f3f46; }
      button.ghost:hover { border-color: #52525b; }
      .msg { font-size: 13px; min-height: 18px; }
      .ok { color: #34d399; } .err { color: #f87171; }
      .hint { color: #71717a; font-size: 12px; margin-top: 6px; }
      code { background: #18181b; padding: 1px 5px; border-radius: 5px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>re<b>call</b> — flashcard extension</h1>
      <p class="sub">Point it at your recall worker. Same two values your app uses.</p>

      <label for="url">Worker URL</label>
      <input id="url" type="url" placeholder="https://recall-api.yourname.workers.dev" spellcheck="false" />
      <div class="hint">Your deployed worker, not the cards repo. No trailing <code>/api</code>.</div>

      <label for="token">App token</label>
      <input id="token" type="password" placeholder="the APP_TOKEN you set during setup" />

      <div class="row">
        <button id="save">Save</button>
        <button id="test" class="ghost">Test connection</button>
        <span id="msg" class="msg"></span>
      </div>
    </div>
    <script src="options.js"></script>
  </body>
</html>
